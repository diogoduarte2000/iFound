[build]
  command = "API_PROXY_TARGET=\"${BACKEND_API_ORIGIN:-/.netlify/functions/api/api}\" && sed -i \"s|__BACKEND_PROXY_TARGET__|${API_PROXY_TARGET}|g\" netlify.toml && cd backend && npm install && cd ../frontend && npm install && npm run build"
  publish = "frontend/dist/frontend/browser"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "__BACKEND_PROXY_TARGET__/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
