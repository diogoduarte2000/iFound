<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden p-8 transition-all relative">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
      </div>
      <h2 class="text-3xl font-bold tracking-tight text-white mb-1">Ifound</h2>
      <p class="text-slate-400 text-sm">Plataforma exclusiva para Portugal</p>
    </div>

    <!-- Error Message -->
    @if(errorMessage) {
      <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl mb-6 text-sm flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        {{ errorMessage }}
      </div>
    }

    @if(infoMessage) {
      <div class="bg-blue-500/10 border border-blue-500/40 text-blue-300 p-3 rounded-xl mb-6 text-sm flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"></path></svg>
        {{ infoMessage }}
      </div>
    }

    <!-- Step 1: Credentials -->
    @if(step === 1) {
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <input type="email" formControlName="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="nome@exemplo.pt">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
          <input type="password" formControlName="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="••••••••">
        </div>
        <button type="submit" [disabled]="loginForm.invalid || isLoading" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-400 hover:to-purple-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-500/25 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isLoading ? 'A processar...' : 'Entrar' }}
        </button>
      </form>
    }

    <!-- Step 2: 2FA -->
    @if(step === 2) {
      <form [formGroup]="twoFaForm" (ngSubmit)="onVerify()" class="space-y-5">
        <div class="text-center mb-2">
          <p class="text-slate-300 text-sm">Enviámos um código temporário (2FA) para:</p>
          <p class="font-medium text-white">{{ loginForm.value.email }}</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1 text-center">Código de Segurança</label>
          <input type="text" formControlName="code" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-center text-2xl tracking-widest placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all font-mono" placeholder="000000" maxlength="6">
        </div>
        <button type="submit" [disabled]="twoFaForm.invalid || isLoading" class="w-full bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-400 hover:to-pink-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-purple-500/25 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isLoading ? 'A verificar...' : 'Verificar Código' }}
        </button>
        <button type="button" (click)="step = 1" class="w-full bg-transparent text-slate-400 hover:text-white text-sm py-2">Voltar</button>
      </form>
    }

    <!-- Footer -->
    <div class="mt-8 text-center">
      <p class="text-slate-400 text-sm">Não tens conta? <a routerLink="/register" class="text-blue-400 hover:text-blue-300 font-medium transition-colors cursor-pointer">Regista-te aqui</a></p>
    </div>
  </div>
</div>
