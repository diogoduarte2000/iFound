<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="256" height="256">
    <defs>
        <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0066cc" />
            <stop offset="100%" stop-color="#003399" />
        </linearGradient>
    </defs>
    <!-- Corpo do telemovel (Sombra/Borda) -->
    <rect x="4" y="1" width="16" height="22" rx="4" ry="4" fill="url(#phoneGrad)"/>
    
    <!-- Ecrã -->
    <rect x="5.5" y="2.5" width="13" height="19" rx="2" ry="2" fill="#f5f5f7"/>
    
    <!-- Notch / Coluna de som -->
    <rect x="10" y="4" width="4" height="1" rx="0.5" ry="0.5" fill="#1e293b"/>
    
    <!-- Lupa (iFound) -->
    <circle cx="11.5" cy="11.5" r="3" fill="none" stroke="#0066cc" stroke-width="2"/>
    <line x1="13.5" y1="13.5" x2="16" y2="16" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
</svg>
