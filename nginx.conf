server_tokens off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense-in-depth, Traefik also sets these)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block hidden files
    location ~* /\. {
        deny all;
    }

    # API proxy — forward to backend container
    location /api/ {
        proxy_pass http://ifound-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Match Express body limit (15MB for base64 image attachments)
        client_max_body_size 15m;

        # Timeouts
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Static assets — aggressive caching (Angular hashed filenames)
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Angular SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
