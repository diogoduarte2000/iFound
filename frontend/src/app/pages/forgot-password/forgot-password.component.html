<div class="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-4 font-sans">
  <div class="max-w-[440px] w-full bg-white/90 backdrop-blur-3xl border border-black/[0.04] rounded-[24px] shadow-[0_12px_40px_rgba(0,0,0,0.08)] overflow-hidden p-10 transition-all relative">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-gradient-to-tr from-gray-50 to-gray-100 rounded-[18px] flex items-center justify-center mx-auto mb-6 shadow-sm border border-gray-200/60">
        <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4v-3.268l7.257-7.257A6 6 0 1115 7z"></path></svg>
      </div>
      <h2 class="text-[28px] font-semibold tracking-tight text-[#1d1d1f] mb-2 leading-tight">Recuperar Conta</h2>
      <p class="text-[#86868b] text-[15px]">Defina uma nova palavra-passe</p>
    </div>

    <!-- Error Message -->
    @if(errorMessage) {
      <div class="bg-[#fff2f2] text-[#e30000] p-4 rounded-xl mb-6 text-[15px] flex items-center gap-3 font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        {{ errorMessage }}
      </div>
    }

    @if(infoMessage) {
      <div class="bg-[#f0f8ff] text-[#0066cc] p-4 rounded-xl mb-6 text-[15px] flex items-center gap-3 font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"></path></svg>
        {{ infoMessage }}
      </div>
    }

    <!-- Step 1: Pedir o Email -->
    @if(step === 1) {
      <form [formGroup]="emailForm" (ngSubmit)="onRequestCode()" class="space-y-4">
        <div>
          <input type="email" formControlName="email" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-[17px] placeholder-[#86868b] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all" placeholder="O seu Email">
        </div>
        <div class="pt-4">
          <button type="submit" [disabled]="emailForm.invalid || isLoading" class="w-full bg-[#0066cc] hover:bg-[#005bb5] text-white font-medium py-[14px] px-4 rounded-[14px] transition-all disabled:opacity-50 disabled:cursor-not-allowed text-[17px]">
            {{ isLoading ? 'A processar...' : 'Enviar Código' }}
          </button>
        </div>
      </form>
    }

    <!-- Step 2: Introduzir Código e Nova Palavra-passe -->
    @if(step === 2) {
      <form [formGroup]="resetForm" (ngSubmit)="onResetPassword()" class="space-y-5">
        <div class="text-center mb-6">
          <p class="text-[#86868b] text-[15px]">Código de 6 dígitos enviado para:</p>
          <p class="font-medium text-[#1d1d1f] mt-1">{{ emailForm.value.email }}</p>
        </div>
        <div>
          <label class="block text-[13px] font-medium text-[#86868b] mb-2 pl-2">Código de Segurança</label>
          <input type="text" formControlName="code" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-center tracking-[0.25em] placeholder-[#d2d2d7] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all font-mono" placeholder="000000" maxlength="6">
        </div>
        <div>
          <label class="block text-[13px] font-medium text-[#86868b] mb-2 pl-2">Nova Palavra-passe</label>
          <input type="password" formControlName="newPassword" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-[17px] placeholder-[#d2d2d7] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="pt-2">
          <button type="submit" [disabled]="resetForm.invalid || isLoading" class="w-full bg-[#0066cc] hover:bg-[#005bb5] text-white font-medium py-[14px] px-4 rounded-[14px] transition-all disabled:opacity-50 disabled:cursor-not-allowed text-[17px]">
            {{ isLoading ? 'A alterar...' : 'Alterar Palavra-passe' }}
          </button>
        </div>
        <button type="button" (click)="step = 1" class="w-full bg-transparent text-[#0066cc] hover:underline font-medium text-[15px] py-1 transition-colors">Voltar atrás</button>
      </form>
    }

    <!-- Footer -->
    <div class="mt-8 text-center pt-6 border-t border-[#f5f5f7]">
      <p class="text-[#86868b] text-[15px]">Lembrou-se da passe? <a routerLink="/login" class="text-[#0066cc] hover:underline font-medium transition-colors cursor-pointer">Inicie sessão</a></p>
    </div>
  </div>
</div>
