<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden p-8 transition-all relative">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-tr from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
      </div>
      <h2 class="text-3xl font-bold tracking-tight text-white mb-1">Criar Conta</h2>
      <p class="text-slate-400 text-sm">Junta-te a rede Ifound</p>
    </div>

    @if(message) {
      <div [ngClass]="isSuccess ? 'bg-green-500/10 border-green-500/50 text-green-400' : 'bg-red-500/10 border-red-500/50 text-red-400'" class="border p-3 rounded-xl mb-6 text-sm flex items-center gap-2">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if(isSuccess) { <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path> }
          @else { <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path> }
        </svg>
        {{ message }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Email Publico</label>
        <input type="email" formControlName="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="nome@exemplo.pt">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Password Segura</label>
        <input type="password" formControlName="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="Minimo 6 caracteres">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">NIF (Obrigatorio - Prevencao Fraude)</label>
        <input type="text" formControlName="nif" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="123456789" maxlength="9">
      </div>

      <div class="pt-2">
        <label class="flex items-start gap-3 cursor-pointer">
          <div class="relative flex items-center mt-1">
            <input type="checkbox" formControlName="rgpdConsent" class="peer sr-only">
            <div class="w-5 h-5 bg-white/5 border border-white/20 rounded peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all flex items-center justify-center">
              <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
          </div>
          <span class="text-xs text-slate-400 leading-snug">
            Compreendo que esta aplicacao nao e de uma empresa e concordo com a recolha do meu Email e NIF (encriptados na BD) estritamente para prevencao de fraudes. Aceito a Politica de Privacidade.
          </span>
        </label>
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full mt-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/25 transition-all outline-none disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isLoading ? 'A registar...' : 'Concluir Registo' }}
      </button>
    </form>

    <div class="mt-8 text-center text-sm">
      <p class="text-slate-400">Ja tens uma conta? <a routerLink="/login" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors cursor-pointer">Entra na tua conta</a></p>
    </div>
  </div>
</div>
