<div class="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-4 font-sans">
  <div class="max-w-[440px] w-full bg-white/90 backdrop-blur-3xl border border-black/[0.04] rounded-[24px] shadow-[0_12px_40px_rgba(0,0,0,0.08)] overflow-hidden p-10 transition-all relative">
    
    <div class="text-center mb-10">
      <div class="w-16 h-16 bg-gradient-to-tr from-gray-50 to-gray-100 rounded-[18px] flex items-center justify-center mx-auto mb-6 shadow-sm border border-gray-200/60">
        <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
      </div>
      <h2 class="text-[28px] font-semibold tracking-tight text-[#1d1d1f] mb-2 leading-tight">Criar Identidade</h2>
      <p class="text-[#86868b] text-[15px]">O seu passaporte para a iFound.</p>
    </div>

    @if(message) {
      <div [ngClass]="isSuccess ? 'bg-[#f0fdf4] text-[#15803d]' : 'bg-[#fff2f2] text-[#e30000]'" class="p-4 rounded-xl mb-6 text-[15px] flex items-center gap-3 font-medium">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if(isSuccess) { <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path> }
          @else { <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path> }
        </svg>
        {{ message }}
      </div>
    }

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-[#86868b] uppercase tracking-wider mb-2 ml-1">Email Público</label>
        <input type="email" formControlName="email" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-[17px] placeholder-[#86868b] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all" placeholder="nome@exemplo.pt">
      </div>

      <div>
        <label class="block text-xs font-semibold text-[#86868b] uppercase tracking-wider mb-2 ml-1">Palavra-passe Segura</label>
        <input type="password" formControlName="password" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-[17px] placeholder-[#86868b] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all" placeholder="Mínimo 6 caracteres">
      </div>

      <div>
        <label class="block text-xs font-semibold text-[#86868b] uppercase tracking-wider mb-2 ml-1">NIF (Prevenção Fraude)</label>
        <input type="text" formControlName="nif" class="w-full bg-[#f5f5f7] border border-transparent rounded-[14px] px-4 py-[14px] text-[#1d1d1f] text-[17px] placeholder-[#86868b] focus:outline-none focus:ring-[3px] focus:ring-[#0066cc]/40 focus:bg-white focus:border-[#0066cc] transition-all" placeholder="123456789" maxlength="9">
      </div>

      <div class="pt-3 pb-2">
        <label class="flex items-start gap-3 cursor-pointer group">
          <div class="relative flex items-center tracking-wide mt-0.5">
            <input type="checkbox" formControlName="rgpdConsent" class="peer sr-only">
            <div class="w-[22px] h-[22px] bg-white border-2 border-[#d2d2d7] rounded-full peer-checked:bg-[#0066cc] peer-checked:border-[#0066cc] transition-all flex items-center justify-center group-hover:border-[#86868b]">
              <svg class="w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
          </div>
          <span class="text-[13px] text-[#86868b] leading-relaxed">
            Compreendo que esta aplicação não é de uma empresa e concordo com a recolha do meu Email e NIF (encriptados na BD) estritamente para prevenção de fraudes. Aceito a Política de Privacidade.
          </span>
        </label>
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full bg-[#0066cc] hover:bg-[#005bb5] text-white font-medium py-[14px] px-4 rounded-[14px] transition-all disabled:opacity-50 disabled:cursor-not-allowed text-[17px]">
          {{ isLoading ? 'A registar...' : 'Concluir Registo' }}
        </button>
      </div>
    </form>

    <div class="mt-8 text-center pt-6 border-t border-[#f5f5f7]">
      <p class="text-[#86868b] text-[15px]">Já possui a sua conta iFound? <a routerLink="/login" class="text-[#0066cc] hover:underline font-medium transition-colors cursor-pointer">Inicie sessão aqui.</a></p>
    </div>
  </div>
</div>
